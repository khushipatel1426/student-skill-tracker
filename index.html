<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud-Based Student Skill Progress Tracker</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="light-mode">
    <div class="bg-animation"></div>

    <header class="navbar glass-effect">
        <div class="logo">
            <div class="logo-icon-wrapper">
                <i class="fa-solid fa-cloud-arrow-up"></i>
            </div>
            <h1>SkillTracker Pro</h1>
        </div>
        <div class="header-actions">
            <button id="theme-toggle" class="btn-icon tooltip" data-tooltip="Toggle Dark Mode">
                <i class="fa-solid fa-moon"></i>
            </button>
        </div>
    </header>

    <main class="dashboard-layout">
        <!-- Sidebar layout on desktop, top on mobile -->
        <aside class="sidebar">
            <div class="glass-card add-skill-card">
                <h2><i class="fa-solid fa-plus-circle"></i> Add New Skill</h2>
                <form id="add-skill-form">
                    <div class="form-group">
                        <label for="skill-name">Skill Name</label>
                        <input type="text" id="skill-name" placeholder="e.g., Python, Data Visualization..." required>
                    </div>
                    <div class="form-group">
                        <label for="skill-progress" class="progress-label">
                            Current Progress <span id="progress-val" class="badge">50%</span>
                        </label>
                        <input type="range" id="skill-progress" min="0" max="100" value="50" class="slider" required>
                    </div>
                    <button type="submit" class="btn-primary">
                        <span>Save Skill</span>
                        <i class="fa-solid fa-paper-plane"></i>
                    </button>
                </form>
            </div>

            <div class="glass-card weekly-report-card">
                <div class="report-header">
                    <h2><i class="fa-solid fa-bolt"></i> Weekly Insights</h2>
                </div>
                <div class="report-content">
                    <p class="motivational-message" id="motivational-msg">"Every line of code is a step toward mastery."</p>
                    <ul class="insight-list">
                        <li>
                            <i class="fa-solid fa-arrow-trend-up text-green"></i>
                            <span>Skills upgraded: <b id="weekly-upgraded">0</b></span>
                        </li>
                        <li>
                            <i class="fa-solid fa-layer-group text-purple"></i>
                            <span>Active focus: <b id="weekly-focus">None</b></span>
                        </li>
                    </ul>
                </div>
            </div>
        </aside>

        <!-- Main Dashboard Content -->
        <section class="main-content">
            <!-- KPIS (Key Performance Indicators) -->
            <div class="stats-grid">
                <div class="stat-card glass-card hover-float">
                    <div class="stat-icon bg-gradient-purple">
                        <i class="fa-solid fa-brain"></i>
                    </div>
                    <div class="stat-info">
                        <p>Total Skills</p>
                        <h3 id="stat-total">0</h3>
                    </div>
                </div>
                <div class="stat-card glass-card hover-float">
                    <div class="stat-icon bg-gradient-orange">
                        <i class="fa-solid fa-chart-line"></i>
                    </div>
                    <div class="stat-info">
                        <p>Avg. Progress</p>
                        <h3 id="stat-avg">0%</h3>
                    </div>
                </div>
                <div class="stat-card glass-card hover-float">
                    <div class="stat-icon bg-gradient-green">
                        <i class="fa-solid fa-award"></i>
                    </div>
                    <div class="stat-info">
                        <p>Completed (100%)</p>
                        <h3 id="stat-completed">0</h3>
                    </div>
                </div>
            </div>

            <!-- Charts Area -->
            <div class="charts-grid">
                <div class="chart-card glass-card">
                    <div class="chart-header">
                        <h3>Progress Overview</h3>
                    </div>
                    <div class="chart-container">
                        <canvas id="barChart"></canvas>
                    </div>
                </div>
                <div class="chart-card glass-card">
                    <div class="chart-header">
                        <h3>Status Distribution</h3>
                    </div>
                    <div class="chart-container pie-container">
                        <canvas id="pieChart"></canvas>
                    </div>
                </div>
            </div>

            <!-- Skills List Grid -->
            <div class="section-header">
                <h2><i class="fa-solid fa-book-open-reader"></i> Learning Journey</h2>
                <div class="filter-controls">
                    <!-- Optional: Filter by progress, etc. -->
                </div>
            </div>
            
            <div id="skills-grid" class="skills-grid">
                <!-- Skill cards dynamically injected here -->
            </div>
        </section>
    </main>

    <!-- Update Skill Modal (Hidden by default) -->
    <div id="update-modal" class="modal-overlay">
        <div class="glass-card modal-content">
            <div class="modal-header">
                <h3>Update <span id="update-skill-name-display" class="text-primary"></span></h3>
                <button id="close-modal" class="btn-icon"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label for="update-skill-progress" class="progress-label">
                        New Progress <span id="update-progress-val" class="badge">50%</span>
                    </label>
                    <input type="range" id="update-skill-progress" min="0" max="100" value="50" class="slider">
                </div>
                <button id="save-update-btn" class="btn-primary w-100">Update Now</button>
            </div>
        </div>
    </div>

    <!-- Toast Notifications -->
    <div id="toast-container" class="toast-container"></div>

    <script src="script.js"></script>
</body>
</html>
